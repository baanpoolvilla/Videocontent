<!doctype html>
<html
  lang="th"
  data-composition-variables='[
    {"id":"headline","type":"string","label":"Headline","default":"พูลวิลลา"},
    {"id":"subtitle","type":"string","label":"Subtitle","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent;
        font-family: Arial, sans-serif;
      }
      #root { position: relative; width: 100%; height: 100%; }
      .pill {
        position: absolute; left: 50%; top: 1120px; transform: translateX(-50%);
        max-width: 920px; width: max-content;
        background: #FF1F8F;
        padding: 30px 56px;
        border-radius: 26px;
        box-shadow: 0 14px 34px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.25);
      }
      .pill-text {
        font-family: 'Arial Black', Arial, sans-serif;
        font-weight: 900; font-size: 56px; color: #fff;
        letter-spacing: 0.01em; text-align: center;
        text-shadow: 0 2px 6px rgba(0,0,0,.2);
      }
      .subtitle {
        position: absolute; left: 60px; right: 60px; top: 1250px;
        text-align: center;
        font-size: 30px; font-weight: 400; color: #fff;
        letter-spacing: 0.01em; opacity: 0.9;
        text-shadow: 0 2px 14px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3.5"
      data-width="1080"
      data-height="1920"
    >
      <div id="pill" class="clip pill" data-start="0" data-duration="3.5" data-track-index="0">
        <div id="headline" class="pill-text"></div>
      </div>
      <div id="subtitle" class="clip subtitle" data-start="0" data-duration="3.5" data-track-index="1"></div>
    </div>

    <script>
      const { headline, subtitle } = window.__hyperframes.getVariables();
      document.querySelector("#headline").textContent = headline;
      document.querySelector("#subtitle").textContent = subtitle;
      if (!subtitle) document.querySelector("#subtitle").style.display = "none";

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.set("#pill", { opacity: 0, scale: 0.7, transformOrigin: "center center" });
      tl.set("#subtitle", { opacity: 0, y: 14 });

      // Energetic pop-in with a little overshoot bounce, matching the loud/punchy
      // "TV shopping" energy the style is modeled on.
      tl.to("#pill", { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2.2)" }, 0.1);
      tl.to("#subtitle", { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 0.5);

      // Fade back out before the composition's own duration ends — the compositor overlays
      // this on top of the main clip with eof_action=pass, so without this the title would
      // just hard-cut away the instant this MOV ends instead of leaving cleanly.
      tl.to(["#pill", "#subtitle"], { opacity: 0, duration: 0.4, ease: "power1.in" }, 3.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
