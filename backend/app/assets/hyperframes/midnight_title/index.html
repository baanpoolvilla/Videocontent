<!doctype html>
<html
  lang="th"
  data-composition-variables='[
    {"id":"headline","type":"string","label":"Headline","default":"พูลวิลลา"},
    {"id":"subtitle","type":"string","label":"Subtitle","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: transparent;
        font-family: Georgia, 'Times New Roman', serif;
      }
      #root { position: relative; width: 100%; height: 100%; }
      .headline {
        position: absolute; left: 60px; right: 60px; top: 1150px;
        text-align: center;
        font-size: 64px; font-weight: 400; color: #E8C97E;
        letter-spacing: 0.04em;
        text-shadow: 0 2px 20px rgba(0,0,0,.65), 0 1px 4px rgba(0,0,0,.6);
      }
      .accent-line {
        position: absolute; left: 50%; top: 1130px;
        width: 60px; height: 2px; background: #E8C97E;
        transform: translateX(-50%);
        transform-origin: center;
        box-shadow: 0 1px 8px rgba(0,0,0,.4);
      }
      .subtitle {
        position: absolute; left: 60px; right: 60px; top: 1240px;
        text-align: center;
        font-size: 30px; color: #fff; font-family: Arial, sans-serif;
        letter-spacing: 0.02em; opacity: 0.85;
        text-shadow: 0 2px 14px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3.5"
      data-width="1080"
      data-height="1920"
    >
      <div id="accent" class="clip accent-line" data-start="0" data-duration="3.5" data-track-index="0"></div>
      <div id="headline" class="clip headline" data-start="0" data-duration="3.5" data-track-index="1"></div>
      <div id="subtitle" class="clip subtitle" data-start="0" data-duration="3.5" data-track-index="2"></div>
    </div>

    <script>
      const { headline, subtitle } = window.__hyperframes.getVariables();
      document.querySelector("#headline").textContent = headline;
      document.querySelector("#subtitle").textContent = subtitle;
      if (!subtitle) document.querySelector("#subtitle").style.display = "none";

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.set("#accent", { scaleX: 0, opacity: 0 });
      tl.set("#headline", { opacity: 0, y: 16 });
      tl.set("#subtitle", { opacity: 0, y: 14 });

      tl.to("#accent", { scaleX: 1, opacity: 1, duration: 0.6, ease: "power2.out" }, 0.1);
      tl.to("#headline", { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 0.2);
      tl.to("#subtitle", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, 0.55);

      // Fade back out before the composition's own duration ends — the compositor overlays
      // this on top of the main clip with eof_action=pass, so without this the title would
      // just hard-cut away the instant this MOV ends instead of leaving cleanly.
      tl.to(["#headline", "#subtitle", "#accent"], { opacity: 0, duration: 0.4, ease: "power1.in" }, 3.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
